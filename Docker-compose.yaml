version: '3.8'

services:
  mqtt:
    image: eclipse-mosquitto
    ports:
      - "1883:1883"

  publisher:
    build: ./publisher
    depends_on:
      - mqtt
    develop:
      watch:
        # Rebuild the image if requirements/package files change
        - action: rebuild
          path: ./publisher/package.json
        #  sync code changes for the running process
        - action: sync
          path: ./publisher
          target: /app
          ignore:
            - node_modules/

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - mqtt
    develop:
      watch:
        - action: rebuild
          path: ./backend/package.json
        - action: rebuild
          path: ./backend
          target: /app
          ignore:
            - node_modules/

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    develop:
      watch:
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend
          target: /app
          ignore:
            - node_modules/

  ai-brain:
    build: ./ML
    ports:
      - "5001:5001"
    develop:
      watch:
        - action: rebuild
          path: ./ML/requirements.txt
        - action: sync
          path: ./ML
          target: /app